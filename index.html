<!DOCTYPE html>
<html>
<head>
    <title>Route Finder Activity</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        input { padding: 8px; margin-right: 10px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MapQuest API Integration</h2>
        <input type="text" id="start" placeholder="Starting Point (City, State)">
        <input type="text" id="end" placeholder="Destination (City, State)">
        <button id="btn">Get Route Details</button>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>Start</th>
                    <th>Destination</th>
                    <th>Distance (Miles)</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
